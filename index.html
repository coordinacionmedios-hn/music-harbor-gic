<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Music Harbor</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Harbor">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ios-bg: #FFFFFF; --ios-card: #FFFFFF; --ios-accent: #007AFF; --ios-text: #000000; --ios-secondary: #8E8E93; --ios-pill: #A0A0A0; }
        @media (prefers-color-scheme: dark) { :root { --ios-bg: #000000; --ios-card: #000000; --ios-text: #FFFFFF; --ios-secondary: #8E8E93; --ios-pill: #3A3A3C; } }
        body { background-color: var(--ios-bg); color: var(--ios-text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-bar { background: rgba(249, 249, 249, 0.94); backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) { .tab-bar { background: rgba(18, 18, 18, 0.94); border-top: 0.5px solid rgba(255,255,255,0.1); } }
        .pill { background-color: var(--ios-pill); color: #FFFFFF; border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
        .search-bar { background-color: #EBEDF0; border-radius: 10px; padding: 8px 12px; }
        @media (prefers-color-scheme: dark) { .search-bar { background-color: #1C1C1E; } }
        .floating-segment { background: rgba(235, 237, 240, 0.9); backdrop-filter: blur(10px); border-radius: 14px; padding: 4px; }
        @media (prefers-color-scheme: dark) { .floating-segment { background: rgba(28, 28, 30, 0.9); } }
        .active-tab { color: #007AFF; }
    </style>
</head>
<body class="safe-top safe-bottom h-screen overflow-hidden flex flex-col">
    <!-- Header Tools -->
    <div class="px-5 pt-4 flex justify-between items-center">
        <div class="w-10 h-10 bg-gray-100 dark:bg-zinc-800 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-ellipsis text-gray-600"></i>
        </div>
        <div class="flex space-x-4 items-center">
            <i class="fa-solid fa-chart-line text-gray-500"></i>
            <i class="fa-solid fa-grip text-gray-500"></i>
            <i class="fa-solid fa-wand-magic-sparkles text-gray-400"></i>
        </div>
    </div>

    <header class="px-5 pt-4 pb-2">
        <h1 class="text-4xl font-bold border-b-4 border-blue-500 inline-block">Lanzamientos</h1>
        <div class="mt-4 search-bar flex items-center text-gray-500">
            <i class="fa-solid fa-magnifying-glass mr-2"></i>
            <span class="text-sm">Álbum, artista o género</span>
        </div>
        
        <!-- Toggle HN/Global Custom -->
        <div class="mt-4 flex space-x-4 text-xs font-bold uppercase tracking-widest border-b border-gray-100 dark:border-zinc-800 pb-2">
            <button id="btn-hn" class="text-blue-500">Honduras</button>
            <button id="btn-global" class="text-gray-400">Global</button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-5 pb-32">
        <h2 class="text-xl font-bold mt-6 mb-4">Este Mes</h2>
        
        <div id="content-grid" class="space-y-6">
            <!-- Music Harbor Style Card -->
            <div class="flex items-start">
                <div class="w-24 h-24 bg-zinc-200 rounded-lg bg-cover bg-center shadow-sm" style="background-image: url('https://i.scdn.co/image/ab67616d0000b27376c7081702f23e6f9261f307')"></div>
                <div class="ml-4 flex-1 flex flex-col justify-center">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-medium leading-tight">COCO <span class="text-gray-400 font-normal">- Single</span></h3>
                            <p class="text-gray-500 dark:text-zinc-400 mt-0.5">Raffy</p>
                        </div>
                        <div class="w-3 h-3 bg-blue-500 rounded-full mt-1.5"></div>
                    </div>
                    <div class="flex space-x-1.5 mt-4">
                        <span class="pill">ANTEAYER</span>
                        <span class="pill">SENCILLO</span>
                        <span class="pill">AFROBEAT</span>
                    </div>
                </div>
            </div>

            <!-- Example 2 -->
            <div class="flex items-start">
                <div class="w-24 h-24 bg-zinc-200 rounded-lg bg-cover bg-center shadow-sm" style="background-image: url('https://i.scdn.co/image/ab67616d0000b273922c23507d3b2c9d81d58288')"></div>
                <div class="ml-4 flex-1 flex flex-col justify-center">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-medium leading-tight">No Les Creas <span class="text-gray-400 font-normal">- Single</span></h3>
                            <p class="text-gray-500 dark:text-zinc-400 mt-0.5">Sloky, JCP el Especialista</p>
                        </div>
                        <div class="w-3 h-3 bg-blue-500 rounded-full mt-1.5"></div>
                    </div>
                    <div class="flex space-x-1.5 mt-4">
                        <span class="pill">20/5/26</span>
                        <span class="pill">SENCILLO</span>
                        <span class="pill">URBANO LATINO</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Segmented Control -->
    <div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-80">
        <div class="floating-segment flex text-xs font-bold uppercase shadow-lg">
            <button class="flex-1 py-3 bg-white dark:bg-zinc-700 rounded-xl shadow-sm">Disponibles</button>
            <button class="flex-1 py-3 text-gray-500">Próximamente</button>
        </div>
    </div>

    <!-- Updated Tab Bar -->
    <nav class="tab-bar fixed bottom-0 left-0 right-0 h-20 safe-bottom flex justify-around items-center px-2">
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-users text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Siguiendo</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-newspaper text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Noticias</span>
        </div>
        <div class="flex flex-col items-center active-tab">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Lanzamientos</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-clapperboard text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Videos</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Ajustes</span>
        </div>
    </nav>
    
    <script>
        const btnHn = document.getElementById('btn-hn');
        const btnGlobal = document.getElementById('btn-global');
        btnHn.onclick = () => {
            btnHn.classList.replace('text-gray-400', 'text-blue-500');
            btnGlobal.classList.replace('text-blue-500', 'text-gray-400');
        };
        btnGlobal.onclick = () => {
            btnGlobal.classList.replace('text-gray-400', 'text-blue-500');
            btnHn.classList.replace('text-blue-500', 'text-gray-400');
        };
    </script>
</body>
</html>
