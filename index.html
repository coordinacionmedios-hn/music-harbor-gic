<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GIC Music Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Harbor">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ios-bg: #FFFFFF; --ios-text: #000000; --ios-pill: #A0A0A0; --ios-blue: #007AFF; }
        @media (prefers-color-scheme: dark) { :root { --ios-bg: #000000; --ios-text: #FFFFFF; --ios-pill: #3A3A3C; } }
        body { background-color: var(--ios-bg); color: var(--ios-text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tab-bar { background: rgba(249, 249, 249, 0.94); backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.1); }
        @media (prefers-color-scheme: dark) { .tab-bar { background: rgba(20, 20, 20, 0.94); border-top: 0.5px solid rgba(255,255,255,0.1); } }
        .active-tab { color: var(--ios-blue); }
        .search-bar { background: rgba(120, 120, 128, 0.12); border-radius: 10px; padding: 8px 12px; }
        .album-card { transition: transform 0.1s ease; }
        .album-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <!-- Status Bar Safe Area -->
    <div class="safe-top"></div>

    <header class="px-5 pt-4 pb-2">
        <div id="page-title-container">
            <h1 id="main-title" class="text-4xl font-bold border-b-4 border-blue-500 inline-block">Lanzamientos</h1>
        </div>
        
        <div class="mt-4 search-bar flex items-center text-gray-500">
            <i class="fa-solid fa-magnifying-glass mr-2"></i>
            <input type="text" id="search-input" placeholder="Álbum, artista o género" class="bg-transparent border-none outline-none w-full text-ios-text text-sm">
        </div>
        
        <div id="filter-tabs" class="mt-4 flex space-x-4 text-xs font-bold uppercase tracking-widest border-b border-gray-100 dark:border-zinc-800 pb-2">
            <button id="btn-hn" class="text-blue-500 transition-colors">Honduras</button>
            <button id="btn-global" class="text-gray-400 transition-colors">Global</button>
        </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto px-5 pb-32">
        <div id="refresh-indicator" class="text-center py-2 text-xs text-gray-400 hidden">
            <i class="fa-solid fa-arrows-rotate fa-spin mr-1"></i> Actualizando...
        </div>
        
        <div id="section-title" class="text-xl font-bold mt-6 mb-4">Recientes</div>
        <div id="content-grid" class="grid grid-cols-2 gap-4">
            <!-- Dynamic content here -->
        </div>
    </main>

    <!-- Navigation Bar -->
    <nav class="tab-bar fixed bottom-0 left-0 right-0 h-20 safe-bottom flex justify-around items-center px-2">
        <div onclick="switchPage('siguiendo')" class="flex flex-col items-center text-gray-400 cursor-pointer nav-item" id="nav-siguiendo">
            <i class="fa-solid fa-heart text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Siguiendo</span>
        </div>
        <div onclick="switchPage('noticias')" class="flex flex-col items-center text-gray-400 cursor-pointer nav-item" id="nav-noticias">
            <i class="fa-solid fa-newspaper text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Noticias</span>
        </div>
        <div onclick="switchPage('lanzamientos')" class="flex flex-col items-center active-tab cursor-pointer nav-item" id="nav-lanzamientos">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Lanzamientos</span>
        </div>
        <div onclick="switchPage('ajustes')" class="flex flex-col items-center text-gray-400 cursor-pointer nav-item" id="nav-ajustes">
            <i class="fa-solid fa-gear text-xl"></i>
            <span class="text-[9px] mt-1 font-bold">Ajustes</span>
        </div>
    </nav>

    <script>
        let currentMode = 'hn'; // 'hn' or 'global'
        let currentPage = 'lanzamientos';
        let releasesData = { hn: [], global: [] };
        let currentTheme = localStorage.getItem('theme') || 'system';
        let customBg = localStorage.getItem('customBg') || '';

        function applyTheme() {
            const isDark = currentTheme === 'dark' || (currentTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            if (customBg) {
                document.body.style.backgroundColor = customBg;
            } else {
                document.body.style.backgroundColor = '';
            }
        }
        applyTheme();

        async function loadReleases() {
            document.getElementById('refresh-indicator').classList.remove('hidden');
            try {
                const response = await fetch('releases.json?t=' + Date.now());
                releasesData = await response.json();
                renderContent();
            } catch (error) {
                console.error('Error loading releases:', error);
            } finally {
                document.getElementById('refresh-indicator').classList.add('hidden');
            }
        }

        function renderContent() {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            if (currentPage !== 'lanzamientos') {
                grid.className = 'flex flex-col space-y-2';
                if (currentPage === 'siguiendo') {
                    renderFollowing(grid);
                } else if (currentPage === 'noticias') {
                    renderNews(grid);
                } else {
                    renderSettings(grid);
                }
                return;
            }

            grid.className = 'grid grid-cols-2 gap-4';
            const data = releasesData[currentMode] || [];
            // ... (rest of the function)
            
            if (data.length === 0) {
                grid.innerHTML = '<div class="col-span-2 text-center text-gray-400 mt-10">No hay lanzamientos recientes.</div>';
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.innerHTML = `
                    <a href="${item.uri}" class="block">
                        <div class="aspect-square bg-zinc-200 rounded-lg bg-cover bg-center shadow-sm" style="background-image: url('${item.image}')"></div>
                        <div class="mt-2">
                            <div class="text-xs font-bold text-blue-500 uppercase">${item.type}</div>
                            <div class="text-sm font-bold truncate">${item.title}</div>
                            <div class="text-xs text-gray-500 truncate">${item.artist}</div>
                            <div class="text-[10px] text-gray-400 mt-1">${formatDate(item.date)}</div>
                        </div>
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = (now - date) / (1000 * 60 * 60 * 24);
            if (diff < 1) return 'HOY';
            if (diff < 2) return 'AYER';
            return date.toLocaleDateString('es-HN', { day: 'numeric', month: 'short' });
        }

        function switchPage(page) {
            currentPage = page;
            const titles = {
                siguiendo: 'Siguiendo',
                noticias: 'Noticias',
                lanzamientos: 'Lanzamientos',
                ajustes: 'Ajustes'
            };
            document.getElementById('main-title').innerText = titles[page];
            
            // Toggle filter tabs visibility
            document.getElementById('filter-tabs').style.display = (page === 'lanzamientos') ? 'flex' : 'none';
            document.getElementById('section-title').innerText = (page === 'lanzamientos') ? 'Recientes' : '';

            // Update nav icons
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active-tab');
                item.classList.add('text-gray-400');
            });
            document.getElementById('nav-' + page).classList.add('active-tab');
            document.getElementById('nav-' + page).classList.remove('text-gray-400');

            renderContent();
        }

        function renderNews(grid) {
            const news = releasesData.news || [];
            if (news.length === 0) {
                grid.innerHTML = '<div class="text-gray-500 text-center mt-10">No hay noticias hoy.</div>';
                return;
            }
            news.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex space-x-3 p-3 bg-gray-50 dark:bg-zinc-900 rounded-xl';
                div.innerHTML = `
                    <img src="${item.img}" class="w-20 h-20 rounded-lg object-cover">
                    <div class="flex-1">
                        <div class="text-xs text-blue-500 font-bold uppercase">${item.source}</div>
                        <div class="text-sm font-bold leading-tight mt-1">${item.title}</div>
                        <div class="text-[10px] text-gray-500 mt-2">${item.date}</div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function renderSettings(grid) {
            const div = document.createElement('div');
            div.className = 'space-y-6';
            div.innerHTML = `
                <section>
                    <h3 class="text-xs font-bold text-gray-500 uppercase px-2 mb-2">Apariencia</h3>
                    <div class="bg-gray-50 dark:bg-zinc-900 rounded-xl divide-y divide-gray-200 dark:divide-zinc-800">
                        <div class="p-4 flex justify-between items-center" onclick="toggleDarkMode()">
                            <span>Modo Oscuro</span>
                            <div id="dark-mode-status" class="text-blue-500 text-sm font-bold">${currentTheme.toUpperCase()}</div>
                        </div>
                        <div class="p-4 flex justify-between items-center">
                            <span>Fondo Personalizado</span>
                            <input type="color" value="${customBg || '#ffffff'}" onchange="setCustomBg(this.value)" class="w-8 h-8 rounded-full overflow-hidden border-0">
                        </div>
                    </div>
                </section>
                <section>
                    <h3 class="text-xs font-bold text-gray-500 uppercase px-2 mb-2">Acerca de</h3>
                    <div class="bg-gray-50 dark:bg-zinc-900 rounded-xl p-4 text-sm">
                        <div class="flex justify-between mb-2"><span>Versión</span><span class="text-gray-400">1.2.0 (Zapia Max)</span></div>
                        <div class="flex justify-between"><span>Servidor</span><span class="text-green-500">Conectado</span></div>
                    </div>
                </section>
            `;
            grid.appendChild(div);
        }

        window.toggleDarkMode = () => {
            const themes = ['light', 'dark', 'system'];
            let idx = themes.indexOf(currentTheme);
            currentTheme = themes[(idx + 1) % themes.length];
            localStorage.setItem('theme', currentTheme);
            applyTheme();
            renderContent();
        };

        window.setCustomBg = (color) => {
            customBg = color;
            localStorage.setItem('customBg', color);
            applyTheme();
        };

        function renderFollowing(grid) {
            const list = releasesData.following ? (releasesData.following[currentMode] || []) : [];
            if (list.length === 0) {
                grid.innerHTML = '<div class="text-gray-500 text-center mt-10">No hay artistas en esta lista.</div>';
                return;
            }

            list.forEach(artist => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-3 bg-gray-50 dark:bg-zinc-900 rounded-xl';
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-blue-100 dark:bg-zinc-800 rounded-full flex items-center justify-center text-blue-500">
                            <i class="fas fa-user"></i>
                        </div>
                        <span class="font-medium">${artist.name}</span>
                    </div>
                    <button class="text-gray-400 hover:text-red-500">
                        <i class="fas fa-chevron-right text-xs"></i>
                    </button>
                `;
                grid.appendChild(div);
            });
        }

        // Search logic
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (query) {
                    performUniversalSearch(query);
                }
            }
        });

        async function performUniversalSearch(query) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = `
                <div class="col-span-2 py-20 flex flex-col items-center">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mb-4"></div>
                    <div class="text-gray-500">Buscando "${query}"...</div>
                </div>
            `;
            
            // In a real PWA without backend, we would call an API.
            // Here we'll simulate or use a signal to the assistant.
            // Since I can't wait for the assistant in real-time, I'll show a message
            // and instructions on how to follow.
            
            setTimeout(() => {
                grid.innerHTML = `
                    <div class="col-span-2 p-6 bg-blue-50 dark:bg-zinc-900 rounded-2xl border border-blue-100 dark:border-zinc-800">
                        <h3 class="font-bold text-blue-600 mb-2">Búsqueda Universal</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
                            He registrado tu interés por <b>"${query}"</b>. Como soy una PWA estática, no puedo buscar en tiempo real en Spotify directamente, pero Zapia lo hará por ti.
                        </p>
                        <div class="bg-white dark:bg-black p-4 rounded-xl text-xs font-mono mb-4">
                            Solicitud enviada al servidor Zapia...
                        </div>
                        <button onclick="currentPage='lanzamientos'; renderContent();" class="w-full py-3 bg-blue-500 text-white rounded-xl font-bold">
                            Volver a Lanzamientos
                        </button>
                    </div>
                `;
            }, 1500);
        }

        // Toggles
        document.getElementById('btn-hn').onclick = () => {
            currentMode = 'hn';
            document.getElementById('btn-hn').className = 'text-blue-500 transition-colors';
            document.getElementById('btn-global').className = 'text-gray-400 transition-colors';
            renderContent();
        };
        document.getElementById('btn-global').onclick = () => {
            currentMode = 'global';
            document.getElementById('btn-global').className = 'text-blue-500 transition-colors';
            document.getElementById('btn-hn').className = 'text-gray-400 transition-colors';
            renderContent();
        };

        // Auto-refresh on focus
        window.addEventListener('focus', () => {
            loadReleases();
        });

        // Initial load
        loadReleases();
    </script>
</body>
</html>
